services:
    postgres-backend:
        image: postgres:17-bullseye
        restart: no
        volumes:
        - postgres-j1939-dataset:/var/lib/postgresql/data
        environment:
            POSTGRES_PASSWORD: postgres
            POSTGRES_USER: postgres
            POSTGRES_DB: postgres
        ports:
            - "5435:5432"

    mlflow:
        image: ghcr.io/mlflow/mlflow:v2.21.3
        restart: no
        ports:
            - "5050:5000"
        volumes:
            - mlflow-data:/mlflow
        command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts

volumes:
  postgres-j1939-dataset:
  mlflow-data:
